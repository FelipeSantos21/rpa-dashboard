server:
  port: 8080

spring:
  application:
    name: rpa-dashboard
  
  datasource:
    # Use local Supabase PostgreSQL by default
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:54322/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:dtKlOHK6H0HOJnKRS8KUQQRM}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
  
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  
  jpa:
    database-platform: ${SPRING_JPA_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  
  sql:
    init:
      # Automatically run data seeding if needed (schema is auto-generated by hibernate ddl-auto: update)
      mode: always
