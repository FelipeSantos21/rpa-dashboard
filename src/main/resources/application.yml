server:
  port: 8080

spring:
  application:
    name: rpa-dashboard
  
  datasource:
    # Use H2 in-memory by default for zero-setup local execution
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:rpadb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  
  jpa:
    database-platform: ${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  
  sql:
    init:
      # Automatically run data seeding if needed (schema is auto-generated by hibernate ddl-auto: update)
      mode: always
