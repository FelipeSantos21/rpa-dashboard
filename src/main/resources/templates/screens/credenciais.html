<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../static/css/style.css" th:href="@{/css/style.css}">
  <title>Credenciais - Preview</title>
</head>
<body style="background:var(--color-bg); padding:24px; margin:0;">

<div th:fragment="screen" id="screen-credenciais" class="screen">
  <div class="section-header">
    <div>
      <div class="section-h">Usuários e Acessos</div>
      <div class="section-sub">Gerencie os usuários do sistema, perfis e seus vínculos com as empresas clientes</div>
    </div>
    <button class="btn btn-admin" onclick="abrirModalUsuario()">
      <i class="ti ti-user-plus"></i> Novo Usuário
    </button>
  </div>
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title"><i class="ti ti-users" style="color:var(--color-admin);"></i> Lista de Usuários</div>
    </div>
    <table id="tbl-usuarios">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Username</th>
          <th>Perfil (Role)</th>
          <th>Empresas Vinculadas</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <!-- Populated dynamically -->
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
